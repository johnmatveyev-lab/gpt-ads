name: Deploy Cloud Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options:
          - production
          - preview

concurrency:
  group: cloud-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Google Cloud Run
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    env:
      GAR_LOCATION: ${{ vars.GAR_LOCATION || 'us-central1' }}
      CLOUD_RUN_REGION: ${{ vars.CLOUD_RUN_REGION || 'us-central1' }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'gpt-ads-website' }}
      IMAGE_NAME: gpt-ads-website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${GAR_LOCATION}-docker.pkg.dev" --quiet

      - name: Build image
        run: |
          IMAGE_URI="${GAR_LOCATION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY || 'gpt-ads' }}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build \
            --build-arg NEXT_PUBLIC_SITE_URL="${{ vars.NEXT_PUBLIC_SITE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ vars.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --build-arg NEXT_PUBLIC_APP_URL="${{ vars.NEXT_PUBLIC_APP_URL }}" \
            --build-arg NEXT_PUBLIC_OPENAI_ADS_PIXEL_ID="${{ vars.NEXT_PUBLIC_OPENAI_ADS_PIXEL_ID }}" \
            --build-arg NEXT_PUBLIC_OPENAI_ADS_PIXEL_SRC="${{ vars.NEXT_PUBLIC_OPENAI_ADS_PIXEL_SRC }}" \
            -t "${IMAGE_URI}" .
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Push image
        run: docker push "${IMAGE_URI}"

      - name: Deploy service
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --image="${IMAGE_URI}" \
            --region="${CLOUD_RUN_REGION}" \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="NODE_ENV=production,NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }},NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }},NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }},NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --set-secrets="SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,BOOKING_WEBHOOK_SECRET=BOOKING_WEBHOOK_SECRET:latest,ADMIN_ACCESS_TOKEN=ADMIN_ACCESS_TOKEN:latest,RESEND_API_KEY=RESEND_API_KEY:latest"
